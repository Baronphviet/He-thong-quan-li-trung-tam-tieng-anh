version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: english-center-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: english_center
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: english-center-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://db:3306/english_center?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: root
      FLYWAY_ENABLED: "true"
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: english-center-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: /api
      VITE_PROXY_TARGET: http://backend:8080
    ports:
      - "3000:3000"

volumes:
  db_data:
    driver: local
