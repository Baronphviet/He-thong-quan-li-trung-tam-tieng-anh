server:
  port: 8080

spring:
  application:
    name: english-center-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/english_center?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.springframework.web: INFO
