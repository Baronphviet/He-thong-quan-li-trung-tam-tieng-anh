server:
  port: 8080

spring:
  application:
    name: english-center-backend
  datasource:
    url: ${DB_URL:jdbc:h2:mem:english_center;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false}
    driver-class-name: org.h2.Driver
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    locations: classpath:db/migration

logging:
  level:
    org.springframework.web: INFO
